# VSIX リリースワークフロー
# workflow_dispatch でバージョンをインクリメントし、VS Code 拡張 VSIX を
# 自動ビルドして VS Code Marketplace と GitHub Releases に公開します。
name: Release VSIX

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'バージョンアップの種類'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch # 0.0.0 → 0.0.1
          - minor # 0.0.0 → 0.1.0
          - major # 0.0.0 → 1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── バージョン取得・計算 ────────────────────────────────
      - name: Bump version
        id: new_version
        working-directory: VehicleVision.Tools.ScreenSketch.VSCode
        run: |
          npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      # ── VS Code 拡張のビルド・パッケージ ───────────────────
      - name: Install dependencies
        working-directory: VehicleVision.Tools.ScreenSketch.VSCode
        run: npm install

      - name: Build extension
        working-directory: VehicleVision.Tools.ScreenSketch.VSCode
        run: npm run compile

      - name: Package VSIX
        working-directory: VehicleVision.Tools.ScreenSketch.VSCode
        run: npx --yes @vscode/vsce package --no-dependencies --allow-missing-repository

      # ── バージョンコミット・タグ作成 ────────────────────────
      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VehicleVision.Tools.ScreenSketch.VSCode/package.json
          git commit -m "chore: bump vsix version to v${{ steps.new_version.outputs.new_version }}"
          git push

      - name: Create Git tag
        run: |
          git tag "Release_v${{ steps.new_version.outputs.new_version }}"
          git push origin "Release_v${{ steps.new_version.outputs.new_version }}"

      # ── VS Code Marketplace に公開 ─────────────────────────
      - name: Publish to VS Code Marketplace
        working-directory: VehicleVision.Tools.ScreenSketch.VSCode
        run: npx --yes @vscode/vsce publish --no-dependencies --allow-missing-repository
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── GitHub Release を作成してアセットをアップロード ───
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Release_v${{ steps.new_version.outputs.new_version }}
          name: v${{ steps.new_version.outputs.new_version }}
          generate_release_notes: true
          files: |
            VehicleVision.Tools.ScreenSketch.VSCode/*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
