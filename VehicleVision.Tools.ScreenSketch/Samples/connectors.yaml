screen:
  title: コネクタ・手順説明 サンプル
  description: コントロール間を結ぶコネクタ線と、引き出し線の個別色カスタマイズの例

window:
  title: ユーザー登録 手順
  width: 500
  height: 300
  controls:
    - type: label
      text: "名前:"
      x: 20
      y: 20

    - type: textbox
      id: nameInput
      x: 80
      y: 15
      width: 200
      placeholder: 氏名を入力

    - type: label
      text: "メール:"
      x: 20
      y: 60

    - type: textbox
      id: emailInput
      x: 80
      y: 55
      width: 200
      placeholder: email@example.com

    - type: button
      id: submitBtn
      x: 80
      y: 100
      text: 登録

    - type: button
      id: cancelBtn
      x: 170
      y: 100
      text: キャンセル

annotations:
  - target: nameInput
    label: "①"
    description: ユーザーの氏名を入力します。
  - target: emailInput
    label: "②"
    description: メールアドレスを入力します。
    lineColor: "#1976D2"
    lineStyle: dotted
    labelBackground: "#1976D2"
  - target: submitBtn
    label: "③"
    description: 入力内容を登録します。
    lineStyle: solid
    labelBackground: "#4CAF50"

connectors:
  - from: nameInput
    to: emailInput
    label: "①"
    description: 名前を入力後、メールアドレスを入力します。
    fromShape: circle
    toShape: arrow
  - from: emailInput
    to: submitBtn
    label: "②"
    description: メールアドレスを入力後、登録ボタンを押します。
    lineColor: "#4CAF50"
    labelBackground: "#4CAF50"
    fromShape: diamond
    toShape: arrow
  - from: submitBtn
    to: cancelBtn
    label: "③"
    description: 登録完了、またはキャンセルボタンで中止します。
    lineStyle: dashed
    lineColor: "#FF9800"
    labelBackground: "#FF9800"
    fromShape: square
    toShape: diamond
